services:
  web:
    build: .
    container_name: tarabih-web
    restart: unless-stopped
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.tarabih.rule=Host(`tarabih.ae`) || Host(`www.tarabih.ae`)
      - traefik.http.routers.tarabih.entrypoints=websecure
      - traefik.http.routers.tarabih.tls=true
      - traefik.http.routers.tarabih.tls.certresolver=le
      - traefik.http.services.tarabih.loadbalancer.server.port=80

networks:
  edge:
    external: true
    name: edge
